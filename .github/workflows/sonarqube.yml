# 브랜치 푸시/PR 시 SonarQube Cloud 코드 분석
# SONAR_TOKEN 시크릿 및 sonar-project.properties의 projectKey/organization 설정 필요

name: SonarQube

on:
  push:
    branches-ignore:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-frontend-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: ${{ runner.os }}-frontend-

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Cache backend node_modules
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: ${{ runner.os }}-backend-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: ${{ runner.os }}-backend-

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Run frontend tests with coverage
        run: npm run test:run -- --coverage
        working-directory: frontend

      # LCOV 경로가 frontend 기준(src/...)이므로 SonarQube(루트 기준)에서 해석되도록 수정
      - name: Fix LCOV paths for SonarQube
        run: sed -i 's|^SF:src/|SF:frontend/src/|g' frontend/coverage/lcov.info

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # SONAR_TOKEN 미설정 시 "Project not found" 대신 즉시 명확한 오류로 실패
      - name: Check SONAR_TOKEN
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "::error::SONAR_TOKEN is not set. Add it in Settings → Secrets and variables → Actions. See docs/SONARQUBE_CI_TROUBLESHOOTING.md"
            exit 1
          fi

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
